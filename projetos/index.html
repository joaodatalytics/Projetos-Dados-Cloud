<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Chamados - TIC Clínica Florence</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #005a8d; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background-color: #005a8d; color: white; padding: 12px; border: none; border-radius: 4px; margin-top: 20px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #00446a; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Abertura de Chamado - TIC</h2>
        <form id="formChamado">
            <label for="nome">Nome do Funcionário:</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>

            <label for="setor">Setor:</label>
            <select id="setor" name="setor">
                <option value="administrativo">Administrativo</option>
                <option value="enfermagem">Enfermagem</option>
                <option value="recepcao">Recepção</option>
                <option value="medico">Corpo Médico</option>
                <option value="outros">Outros</option>
            </select>

            <label for="prioridade">Urgência:</label>
            <select id="prioridade" name="prioridade">
                <option value="baixa">Baixa (Rotina)</option>
                <option value="media">Média (Atrapalha o trabalho)</option>
                <option value="alta">Alta (Setor parado)</option>
            </select>

            <label for="descricao">Descrição do Problema:</label>
            <textarea id="descricao" name="descricao" rows="4" placeholder="Descreva o erro ou solicitação..." required></textarea>

            <button type="button" onclick="enviarChamado()">Enviar Chamado</button>
        </form>
    </div>

    <script>
        function enviarChamado() {
            // SUBSTITUA O IP ABAIXO PELO IP PÚBLICO DA SUA EC2
            const urlAPI = "http://18.222.168.206/chamados";

            // Coleta os dados digitados
            const dados = {
                nome: document.getElementById('nome').value,
                setor: document.getElementById('setor').value,
                prioridade: document.getElementById('prioridade').value,
                descricao: document.getElementById('descricao').value
            };

            // Muda o texto do botão para mostrar que está carregando
            const btn = document.querySelector('button');
            btn.innerText = "Enviando...";

            // Dispara os dados para a API Python na AWS
            fetch(urlAPI, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dados)
            })
            .then(response => {
                if (response.ok) {
                    alert("Sucesso! Seu chamado foi registrado no banco de dados da Clínica Florence.");
                    document.getElementById('formChamado').reset(); // Limpa o formulário
                } else {
                    alert("Erro ao enviar o chamado. Verifique a API.");
                }
            })
            .catch(error => {
                console.error("Erro:", error);
                alert("Erro de conexão. A API no EC2 está rodando?");
            })
            .finally(() => {
                btn.innerText = "Enviar Chamado"; // Volta o botão ao normal
            });
        }
    </script>
</body>
</html>
