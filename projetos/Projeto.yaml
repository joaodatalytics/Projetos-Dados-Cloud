AWSTemplateFormatVersion: '2010-09-09'
Description: Infraestrutura Helpdesk Analytics - Clinica Florence (TIC)

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Chave para acesso ao servidor de suporte (EC2).

  BucketPortalNome:
    Type: String
    Description: Nome UNICO para o bucket S3.

Resources:

# =============================================================================
# 1. REDE E SEGURANCA (VPC e Subnets em 2 Zonas para o RDS)
# =============================================================================
  VpcFlorence:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 172.16.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: VPC-TIC-Florence

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VpcFlorence
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetTIC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcFlorence
      CidrBlock: 172.16.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: Subnet-Publica-Suporte

  PrivateSubnetDadosA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcFlorence
      CidrBlock: 172.16.2.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: Subnet-Privada-Dados-A

  PrivateSubnetDadosB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcFlorence
      CidrBlock: 172.16.3.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: Subnet-Privada-Dados-B

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcFlorence

  DefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetTIC
      RouteTableId: !Ref PublicRouteTable

# =============================================================================
# 2. PORTAL DE ENTRADA (S3 - Hospedagem do Formulario)
# =============================================================================
  S3PortalChamados:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketPortalNome
      WebsiteConfiguration:
        IndexDocument: index.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref S3PortalChamados
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: '*'
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${S3PortalChamados}/*'

# =============================================================================
# 3. COMPUTACAO E ANALYTICS (EC2)
# =============================================================================
  SecurityGroupSuporte:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Acesso ao Portal de Gestao de TIC
      VpcId: !Ref VpcFlorence
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  ServidorAnalytics:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      KeyName: !Ref KeyPairName
      # CÓDIGO CORRIGIDO ABAIXO:
      ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/amzn2-ami-hvm-x86_64-gp2}}'
      SubnetId: !Ref PublicSubnetTIC
      SecurityGroupIds:
        - !Ref SecurityGroupSuporte
      Tags:
        - Key: Name
          Value: Servidor-Gestao-TIC-Florence

# =============================================================================
# 4. BANCO DE DADOS DE CHAMADOS (RDS MySQL)
# =============================================================================
  SecurityGroupDB:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Acesso ao banco apenas pelo servidor de suporte
      VpcId: !Ref VpcFlorence
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref SecurityGroupSuporte

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Grupo de subnets em 2 zonas para o RDS
      SubnetIds:
        - !Ref PrivateSubnetDadosA
        - !Ref PrivateSubnetDadosB

  BancoChamadosRDS:
    Type: AWS::RDS::DBInstance
    Properties:
      AllocatedStorage: 20
      DBInstanceClass: db.t3.micro
      Engine: MySQL
      MasterUsername: admin_florence
      MasterUserPassword: PasswordSegura123!
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref SecurityGroupDB
      PubliclyAccessible: false
      MultiAZ: false

Outputs:
  URLPortalChamados:
    Description: URL para os funcionarios abrirem chamados
    Value: !GetAtt S3PortalChamados.WebsiteURL

  EndPointBanco:
    Description: Endereco do banco de dados para o Analytics
    Value: !GetAtt BancoChamadosRDS.Endpoint.Address